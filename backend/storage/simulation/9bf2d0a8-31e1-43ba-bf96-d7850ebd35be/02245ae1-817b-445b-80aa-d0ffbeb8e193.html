<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Law of Motion Simulation</title>
    <style>
        body {
            background-color: #0f172a;
            font-family: Arial, sans-serif;
            color: white;
        }
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .control-panel label {
            display: block;
            margin-bottom: 10px;
        }
        .control-panel input[type="range"] {
            width: 100%;
        }
        .learn-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .learn-box p {
            margin-bottom: 20px;
        }
        .canvas-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 40px auto;
        }
        #canvas {
            border: 1px solid #8b5cf6;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <label>Mass: <span id="mass-value">10</span> kg</label>
        <input type="range" id="mass-slider" min="1" max="100" value="10">
        <label>Force: <span id="force-value">10</span> N</label>
        <input type="range" id="force-slider" min="1" max="100" value="10">
        <button id="reset-button">Reset</button>
    </div>
    <div class="learn-box">
        <p>Newton's law of motion states that the force applied to an object is equal to the mass of the object multiplied by its acceleration.</p>
        <p>Try changing the mass and force values to see how they affect the motion of the object.</p>
    </div>
    <div class="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <script>
        // Get the canvas and context
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set up the simulation variables
        let mass = 10;
        let force = 10;
        let acceleration = 0;
        let velocity = 0;
        let position = 0;
        let objectWidth = 50;
        let objectHeight = 50;

        // Set up the Matter.js engine and world
        const Engine = Matter.Engine;
        const World = Matter.World;
        const Bodies = Matter.Bodies;
        const engine = Engine.create();
        const world = engine.world;

        // Create the object
        const object = Bodies.rectangle(400, 300, objectWidth, objectHeight, { mass: mass });
        World.add(world, object);

        // Set up the event listeners
        document.getElementById('mass-slider').addEventListener('input', (e) => {
            mass = parseInt(e.target.value);
            document.getElementById('mass-value').innerText = mass;
            object.mass = mass;
        });
        document.getElementById('force-slider').addEventListener('input', (e) => {
            force = parseInt(e.target.value);
            document.getElementById('force-value').innerText = force;
        });
        document.getElementById('reset-button').addEventListener('click', () => {
            mass = 10;
            force = 10;
            acceleration = 0;
            velocity = 0;
            position = 0;
            object.mass = mass;
            object.position.x = 400;
            object.position.y = 300;
            document.getElementById('mass-slider').value = mass;
            document.getElementById('mass-value').innerText = mass;
            document.getElementById('force-slider').value = force;
            document.getElementById('force-value').innerText = force;
        });

        // Set up the animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Update the acceleration
            acceleration = force / mass;

            // Update the velocity
            velocity += acceleration * 0.01;

            // Update the position
            position += velocity * 0.01;

            // Update the object position
            object.position.x = position + 400;
            object.position.y = 300;

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the object
            ctx.fillStyle = '#8b5cf6';
            ctx.fillRect(object.position.x - objectWidth / 2, object.position.y - objectHeight / 2, objectWidth, objectHeight);

            // Draw the force vector
            ctx.strokeStyle = '#06b6d4';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(object.position.x, object.position.y);
            ctx.lineTo(object.position.x + force * 0.1, object.position.y);
            ctx.stroke();

            // Draw the mass label
            ctx.font = '24px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Mass: ${mass} kg`, 10, 10);

            // Draw the force label
            ctx.fillText(`Force: ${force} N`, 10, 40);

            // Draw the acceleration label
            ctx.fillText(`Acceleration: ${acceleration.toFixed(2)} m/s^2`, 10, 70);

            // Draw the velocity label
            ctx.fillText(`Velocity: ${velocity.toFixed(2)} m/s`, 10, 100);
        }

        // Start the animation loop
        animate();
    </script>
</body>
</html>

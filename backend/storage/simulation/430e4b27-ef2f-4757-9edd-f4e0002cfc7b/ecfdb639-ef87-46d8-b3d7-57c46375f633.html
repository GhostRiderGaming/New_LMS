<!DOCTYPE html>
<html>
<head>
  <style>
    body { background-color: #1a1a2e; color: #fff; }
    .slider { accent-color: #7a288a; }
    .graph { border: 1px solid #00ffff; }
  </style>
</head>
<body>
  <h1>Newton's Law of Motion Simulation</h1>
  <label for="mass">Mass (kg):</label>
  <input type="range" id="mass" min="1" max="100" value="10" class="slider">
  <label for="force">Force (N):</label>
  <input type="range" id="force" min="1" max="100" value="10" class="slider">
  <label for="friction">Friction:</label>
  <input type="range" id="friction" min="0" max="1" value="0.1" step="0.01" class="slider">
  <canvas id="graph" width="400" height="200" class="graph"></canvas>
  <script>
    const massSlider = document.getElementById('mass');
    const forceSlider = document.getElementById('force');
    const frictionSlider = document.getElementById('friction');
    const graph = document.getElementById('graph');
    const ctx = graph.getContext('2d');
    let time = 0;
    let velocity = 0;
    let position = 0;
    let mass = parseInt(massSlider.value);
    let force = parseInt(forceSlider.value);
    let friction = parseFloat(frictionSlider.value);

    function update() {
      const acceleration = (force - friction * velocity) / mass;
      velocity += acceleration * 0.1;
      position += velocity * 0.1;
      time += 0.1;
      ctx.clearRect(0, 0, graph.width, graph.height);
      ctx.beginPath();
      ctx.moveTo(0, graph.height);
      for (let t = 0; t < time; t += 0.1) {
        const v = (force - friction * t) / mass * t;
        ctx.lineTo(t * 4, graph.height - v * 10);
      }
      ctx.stroke();
      requestAnimationFrame(update);
    }

    massSlider.addEventListener('input', () => {
      mass = parseInt(massSlider.value);
    });

    forceSlider.addEventListener('input', () => {
      force = parseInt(forceSlider.value);
    });

    frictionSlider.addEventListener('input', () => {
      friction = parseFloat(frictionSlider.value);
    });

    update();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Newton's Laws of Motion in Biology</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }
        .learn-box {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }
        .slider {
            accent-color: #8b5cf6;
        }
        button {
            background-color: #06b6d4;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #03a9f4;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h2>Control Panel</h2>
        <label for="friction-slider">Friction:</label>
        <input type="range" id="friction-slider" min="0" max="1" step="0.1" value="0.5" class="slider">
        <br>
        <label for="force-slider">Force:</label>
        <input type="range" id="force-slider" min="0" max="10" step="0.1" value="5" class="slider">
        <br>
        <button id="start-button">Start</button>
        <button id="stop-button" disabled>Stop</button>
    </div>
    <div class="learn-box">
        <h2>Learn</h2>
        <p>Newton's Laws of Motion explain how objects move and respond to forces. In biology, these laws apply to the movement of cells and organisms. Friction is a force that opposes motion, while force is a push or pull that causes motion.</p>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script>
        // Get the canvas element
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Define the simulation variables
        let friction = 0.5;
        let force = 5;
        let running = false;

        // Define the cell object
        class Cell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this.radius = 10;
            }

            update() {
                this.vx += this.ax;
                this.vy += this.ay;
                this.x += this.vx;
                this.y += this.vy;
                this.ax = 0;
                this.ay = 0;

                // Apply friction
                this.vx *= (1 - friction);
                this.vy *= (1 - friction);
            }

            applyForce(fx, fy) {
                this.ax += fx;
                this.ay += fy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#8b5cf6';
                ctx.fill();
            }
        }

        // Create a cell object
        const cell = new Cell(canvas.width / 2, canvas.height / 2);

        // Define the animation loop
        function animate() {
            if (running) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Apply force to the cell
                cell.applyForce(force / 10, 0);

                // Update the cell position
                cell.update();

                // Draw the cell
                cell.draw();

                // Draw the force vector
                ctx.beginPath();
                ctx.moveTo(cell.x, cell.y);
                ctx.lineTo(cell.x + force / 10 * 10, cell.y);
                ctx.strokeStyle = '#06b6d4';
                ctx.stroke();

                // Draw the friction vector
                ctx.beginPath();
                ctx.moveTo(cell.x, cell.y);
                ctx.lineTo(cell.x - friction * 10, cell.y);
                ctx.strokeStyle = '#03a9f4';
                ctx.stroke();

                // Draw labels
                ctx.font = '16px Arial';
                ctx.fillStyle = 'white';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('Cell', cell.x - 20, cell.y - 20);
                ctx.fillText('Force', cell.x + force / 10 * 10 - 20, cell.y - 20);
                ctx.fillText('Friction', cell.x - friction * 10 - 20, cell.y - 20);

                requestAnimationFrame(animate);
            }
        }

        // Add event listeners to the control panel
        document.getElementById('friction-slider').addEventListener('input', (e) => {
            friction = parseFloat(e.target.value);
        });

        document.getElementById('force-slider').addEventListener('input', (e) => {
            force = parseFloat(e.target.value);
        });

        document.getElementById('start-button').addEventListener('click', () => {
            running = true;
            animate();
            document.getElementById('start-button').disabled = true;
            document.getElementById('stop-button').disabled = false;
        });

        document.getElementById('stop-button').addEventListener('click', () => {
            running = false;
            document.getElementById('start-button').disabled = false;
            document.getElementById('stop-button').disabled = true;
        });
    </script>
</body>
</html>
